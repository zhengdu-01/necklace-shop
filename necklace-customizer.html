<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 魔法项链工坊 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'ZCOOL XiaoWei', sans-serif;
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE4EC 50%, #F8E1FF 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating decorations */
        .sparkle {
            position: fixed;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            font-size: 24px;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .sparkle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 20%; right: 8%; animation-delay: 1s; }
        .sparkle:nth-child(3) { top: 60%; left: 3%; animation-delay: 2s; }
        .sparkle:nth-child(4) { top: 75%; right: 5%; animation-delay: 0.5s; }
        .sparkle:nth-child(5) { top: 40%; right: 3%; animation-delay: 1.5s; }
        .sparkle:nth-child(6) { top: 85%; left: 10%; animation-delay: 2.5s; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.8rem;
            color: #FF69B4;
            text-shadow: 3px 3px 0 #FFE4EC, 5px 5px 15px rgba(255, 105, 180, 0.3);
            margin-bottom: 10px;
            animation: titleBounce 2s ease-in-out infinite;
        }

        @keyframes titleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .subtitle {
            color: #9B8AA6;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Preview Section */
        .preview-section {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(255, 105, 180, 0.2);
            margin-bottom: 35px;
            position: relative;
            overflow: hidden;
        }

        .preview-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #FF69B4, #FFD700, #9370DB, #FF69B4);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .necklace-display {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 30% 30%, #FFF5F8, #FFE4EC);
            border-radius: 50%;
            border: 4px solid #FFD6E7;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 30px rgba(255, 105, 180, 0.1);
        }

        .necklace-display svg {
            width: 200px;
            height: 200px;
            transition: all 0.5s ease;
        }

        .necklace-name {
            text-align: center;
        }

        .necklace-name input {
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
            color: #5D4E6D;
            background: linear-gradient(135deg, #FFF5F8, #FFE4EC);
            border: 3px solid #FFD6E7;
            border-radius: 25px;
            padding: 12px 25px;
            text-align: center;
            width: 250px;
            outline: none;
            transition: all 0.3s ease;
        }

        .necklace-name input:focus {
            border-color: #FF69B4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            transform: scale(1.02);
        }

        .necklace-name input::placeholder {
            color: #C9B8D0;
        }

        /* Options Sections */
        .options-section {
            background: white;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.12);
        }

        .section-title {
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
            color: #5D4E6D;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before,
        .section-title::after {
            content: '✨';
            font-size: 1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
        }

        .option-card {
            background: linear-gradient(145deg, #FFF8FA, #FFF0F5);
            border: 3px solid transparent;
            border-radius: 20px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .option-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.25);
        }

        .option-card:hover::before {
            opacity: 1;
        }

        .option-card.selected {
            border-color: #FF69B4;
            background: linear-gradient(145deg, #FFE4EC, #FFD6E7);
            animation: selectPulse 0.5s ease;
        }

        @keyframes selectPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .option-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: #FF69B4;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: checkBounce 0.4s ease;
        }

        @keyframes checkBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .option-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-label {
            font-weight: 700;
            color: #5D4E6D;
            font-size: 0.95rem;
        }

        /* Action Button */
        .action-section {
            text-align: center;
            margin-top: 35px;
        }

        .save-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            color: white;
            background: linear-gradient(135deg, #FF69B4, #FF85C1);
            border: none;
            border-radius: 50px;
            padding: 18px 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.4);
            position: relative;
            overflow: hidden;
        }

        .save-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .save-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.5);
        }

        .save-btn:hover::before {
            left: 100%;
        }

        .save-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Confetti animation */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
            font-weight: 600;
            color: #5D4E6D;
            z-index: 1001;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .preview-section {
                padding: 25px;
            }

            .necklace-display {
                width: 220px;
                height: 220px;
            }

            .necklace-display svg {
                width: 160px;
                height: 160px;
            }

            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .option-card {
                padding: 15px 10px;
            }

            .option-icon {
                width: 50px;
                height: 50px;
            }
        }

        /* Chain shine animation */
        @keyframes chainShine {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .chain-shine {
            animation: chainShine 2s ease-in-out infinite;
        }

        /* Pendant glow */
        @keyframes pendantGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.5)); }
            50% { filter: drop-shadow(0 0 15px rgba(255, 105, 180, 0.8)); }
        }

        .pendant-glow {
            animation: pendantGlow 2s ease-in-out infinite;
        }
    </style>
</head>

                <linearGradient id="previewChainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFE066"/>
                    <stop offset="30%" style="stop-color:#FFD700"/>
                    <stop offset="70%" style="stop-color:#DAA520"/>
                    <stop offset="100%" style="stop-color:#FFD700"/>
                </linearGradient>
            `,
            silver: `
                <linearGradient id="previewChainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFFFFF"/>
                    <stop offset="30%" style="stop-color:#E8E8E8"/>
                    <stop offset="70%" style="stop-color:#C0C0C0"/>
                    <stop offset="100%" style="stop-color:#E8E8E8"/>
                </linearGradient>
            `,
            rosegold: `
                <linearGradient id="previewChainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFE4E1"/>
                    <stop offset="30%" style="stop-color:#E8A9A9"/>
                    <stop offset="70%" style="stop-color:#B76E79"/>
                    <stop offset="100%" style="stop-color:#E8A9A9"/>
                </linearGradient>
            `
        };

        const chainStroke = {
            gold: '#DAA520',
            silver: '#A8A8A8',
            rosegold: '#B76E79'
        };

        // Generate necklace SVG
        function generateNecklaceSVG() {
            const chainGrad = chainGradients[selectedChain];
            const pendant = pendantSVGs[selectedPendant];
            const stroke = chainStroke[selectedChain];

            return `
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        ${chainGrad}
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

                    <!-- Chain -->
                    <path d="M20 20 Q50 60, 100 75 Q150 60, 180 20"
                          stroke="url(#previewChainGrad)"
                          stroke-width="8"
                          fill="none"
                          stroke-linecap="round"/>

                    <!-- Chain highlight -->
                    <path d="M20 20 Q50 60, 100 75 Q150 60, 180 20"
                          stroke="rgba(255,255,255,0.4)"
                          stroke-width="3"
                          fill="none"
                          stroke-linecap="round"
                          class="chain-shine"/>

                    <!-- Pendant connection ring -->
                    <circle cx="100" cy="78" r="6" fill="none" stroke="${stroke}" stroke-width="3"/>

                    <!-- Pendant -->
                    <g transform="translate(100, 100)" filter="url(#glow)" class="pendant-glow">
                        <g transform="translate(-100, -100)">
                            ${pendant}
                        </g>
                    </g>
                </svg>
            `;
        }

        // Update preview
        function updatePreview() {
            const display = document.getElementById('necklaceDisplay');
            display.innerHTML = generateNecklaceSVG();
        }

        // Handle pendant selection
        document.querySelectorAll('[data-pendant]').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('[data-pendant]').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPendant = card.dataset.pendant;
                updatePreview();
                createMiniConfetti(card);
            });
        });

        // Handle chain selection
        document.querySelectorAll('[data-chain]').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('[data-chain]').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChain = card.dataset.chain;
                updatePreview();
                createMiniConfetti(card);
            });
        });

        // Mini confetti effect
        function createMiniConfetti(element) {
            const rect = element.getBoundingClientRect();
            const emojis = ['✨', '💖', '⭐', '💕'];

            for (let i = 0; i < 5; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                confetti.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 60 + 'px';
                confetti.style.top = rect.top + rect.height / 2 + 'px';
                confetti.style.fontSize = Math.random() * 10 + 15 + 'px';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Create celebration confetti
        function createCelebrationConfetti() {
            const emojis = ['✨', '💖', '⭐', '💕', '🌸', '💫', '🎉', '🌟'];

            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-30px';
                    confetti.style.fontSize = Math.random() * 15 + 20 + 'px';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }

        // Save button
        document.getElementById('saveBtn').addEventListener('click', () => {
            const name = document.getElementById('necklaceName').value.trim() || '我的神秘项链';
            const pendantNames = { heart: '爱心', star: '星星', gem: '宝石', moon: '月亮' };
            const chainNames = { gold: '金链', silver: '银链', rosegold: '玫瑰金链' };

            const message = `💖 "${name}" 已保存！\n(${pendantNames[selectedPendant]} + ${chainNames[selectedChain]})`;
            showToast('保存成功！太漂亮啦~');
            createCelebrationConfetti();

            // Optional: Save to localStorage
            const saveData = {
                name,
                pendant: selectedPendant,
                chain: selectedChain,
                timestamp: Date.now()
            };
            localStorage.setItem('myNecklace', JSON.stringify(saveData));
        });

        // Initialize
        document.querySelector('[data-pendant="heart"]').classList.add('selected');
        document.querySelector('[data-chain="gold"]').classList.add('selected');
        updatePreview();

        // Add entrance animation
        document.querySelectorAll('.option-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.5s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100 + index * 80);
        });

        // Load saved necklace if exists
        const saved = localStorage.getItem('myNecklace');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                selectedPendant = data.pendant;
                selectedChain = data.chain;

                document.querySelectorAll('[data-pendant]').forEach(c => c.classList.remove('selected'));
                document.querySelector(`[data-pendant="${selectedPendant}"]`).classList.add('selected');

                document.querySelectorAll('[data-chain]').forEach(c => c.classList.remove('selected'));
                document.querySelector(`[data-chain="${selectedChain}"]`).classList.add('selected');

                document.getElementById('necklaceName').value = data.name || '';
                updatePreview();
            } catch (e) {
                console.log('Could not load saved necklace');
            }
        }
    </script>
</body>
</html>

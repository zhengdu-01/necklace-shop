<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="300" fill="#f5f5f5"/>
  
  <!-- 脖子 -->
  <ellipse cx="100" cy="115" rx="14" ry="16" fill="#E8C4A0" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 脖子参考点（隐藏） -->
  <circle cx="100" cy="110" r="5" fill="none" id="neckPoint"/>
  
  <!-- 身体/衣服 - 粉色吊带裙 丰满版 -->
  <!-- 左肩带 -->
  <rect x="68" y="128" width="8" height="25" fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 右肩带 -->
  <rect x="124" y="128" width="8" height="25" fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 裙子主体 - 宽肩80px，胸部隆起 -->
  <path d="M 60 148 
           Q 55 165 52 185
           Q 48 210 45 240
           L 42 280
           L 158 280
           L 155 240
           Q 152 210 148 185
           Q 145 165 140 148
           Q 120 165 100 155
           Q 80 165 60 148 Z" 
        fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 胸部隆起 -->
  <ellipse cx="85" cy="165" rx="18" ry="15" fill="#FF1493" opacity="0.3"/>
  <ellipse cx="115" cy="165" rx="18" ry="15" fill="#FF1493" opacity="0.3"/>
  
  <!-- 衣服褶皱阴影 -->
  <path d="M 65 190 Q 75 215 70 240" fill="none" stroke="#C71585" stroke-width="2" opacity="0.5"/>
  <path d="M 135 190 Q 125 215 130 240" fill="none" stroke="#C71585" stroke-width="2" opacity="0.5"/>
  <path d="M 85 210 Q 100 235 115 210" fill="none" stroke="#C71585" stroke-width="2" opacity="0.3"/>
  
  <!-- 头部 - 大头小身比例 -->
  <!-- 脸型 -->
  <ellipse cx="100" cy="70" rx="48" ry="52" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="52" cy="70" rx="9" ry="13" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  <ellipse cx="148" cy="70" rx="9" ry="13" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 头发 - 黑色直发齐刘海 -->
  <!-- 后脑勺头发 -->
  <path d="M 52 70 Q 47 38 100 32 Q 153 38 148 70 L 148 88 Q 153 105 142 115 L 58 115 Q 47 105 52 88 Z" 
        fill="#1a1a1a" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 刘海 -->
  <path d="M 55 52 Q 68 63 78 52 Q 89 63 100 52 Q 111 63 122 52 Q 132 63 145 52" 
        fill="none" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
  <!-- 两侧长发 -->
  <path d="M 52 70 Q 40 105 48 140" fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round"/>
  <path d="M 148 70 Q 160 105 152 140" fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round"/>
  
  <!-- 眉毛 -->
  <path d="M 72 58 Q 80 55 88 58" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 112 58 Q 120 55 128 58" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 - 深棕色圆点 -->
  <circle cx="80" cy="72" r="7" fill="#4A3728" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="120" cy="72" r="7" fill="#4A3728" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- 眼睛高光 -->
  <circle cx="82" cy="70" r="2.5" fill="white"/>
  <circle cx="122" cy="70" r="2.5" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="65" cy="88" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="135" cy="88" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <path d="M 100 80 L 97 88 L 103 88" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 嘴巴 - 可爱微笑 -->
  <path d="M 88 100 Q 100 108 112 100" fill="none" stroke="#C44569" stroke-width="2.5" stroke-linecap="round"/>
</svg>
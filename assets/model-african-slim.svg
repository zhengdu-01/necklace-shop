<svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 像素大小：4x4 SVG单位 -->
  
  <!-- 头发后层 - 黑色卷发 -->
  <g fill="#1A1A1A">
    <!-- 卷发轮廓 -->
    <rect x="20" y="8" width="4" height="4"/>
    <rect x="24" y="4" width="8" height="4"/>
    <rect x="32" y="4" width="16" height="4"/>
    <rect x="48" y="4" width="8" height="4"/>
    <rect x="56" y="8" width="4" height="4"/>
    <!-- 蓬松卷发 -->
    <rect x="16" y="12" width="8" height="4"/>
    <rect x="12" y="16" width="8" height="4"/>
    <rect x="12" y="20" width="8" height="4"/>
    <rect x="12" y="24" width="8" height="4"/>
    <rect x="12" y="28" width="8" height="4"/>
    <rect x="60" y="12" width="8" height="4"/>
    <rect x="64" y="16" width="4" height="4"/>
    <rect x="64" y="20" width="4" height="4"/>
    <rect x="60" y="24" width="8" height="4"/>
    <rect x="60" y="28" width="8" height="4"/>
    <!-- 中间卷发 -->
    <rect x="20" y="8" width="40" height="4"/>
    <rect x="16" y="12" width="48" height="4"/>
    <rect x="16" y="16" width="48" height="4"/>
    <rect x="16" y="20" width="48" height="4"/>
    <rect x="16" y="24" width="48" height="4"/>
  </g>
  
  <!-- 身体/衣服 - 紫色吊带裙 纤细版 -->
  <g fill="#9B59B6">
    <!-- 左肩带 -->
    <rect x="32" y="64" width="4" height="8"/>
    <!-- 右肩带 -->
    <rect x="44" y="64" width="4" height="8"/>
    <!-- 裙子主体 - 窄版 -->
    <rect x="28" y="72" width="4" height="4"/>
    <rect x="48" y="72" width="4" height="4"/>
    <rect x="24" y="76" width="32" height="4"/>
    <rect x="24" y="80" width="32" height="4"/>
    <rect x="24" y="84" width="32" height="4"/>
    <rect x="24" y="88" width="32" height="4"/>
    <rect x="24" y="92" width="32" height="4"/>
    <rect x="24" y="96" width="32" height="4"/>
    <rect x="24" y="100" width="32" height="4"/>
    <rect x="24" y="104" width="32" height="4"/>
    <rect x="24" y="108" width="32" height="4"/>
    <rect x="24" y="112" width="32" height="4"/>
  </g>
  
  <!-- 脖子 -->
  <g fill="#8B5A3C">
    <rect x="36" y="56" width="4" height="4"/>
    <rect x="40" y="56" width="4" height="4"/>
  </g>
  
  <!-- 项链占位符 - 会被JS替换 -->
  <g id="necklace-group">
    <!-- 链子 -->
    <rect x="28" y="60" width="4" height="4" fill="#FFD700"/>
    <rect x="32" y="62" width="4" height="4" fill="#FFD700"/>
    <rect x="36" y="63" width="4" height="4" fill="#FFD700"/>
    <rect x="40" y="63" width="4" height="4" fill="#FFD700"/>
    <rect x="44" y="62" width="4" height="4" fill="#FFD700"/>
    <rect x="48" y="60" width="4" height="4" fill="#FFD700"/>
    <!-- 吊坠组 -->
    <g id="pendant-group" transform="translate(38, 66)">
      <rect x="0" y="0" width="8" height="8" fill="#FF69B4"/>
    </g>
  </g>
  
  <!-- 头部 - 4头身比例，头占1份 -->
  <!-- 脸型 - 深棕色皮肤 -->
  <g fill="#8B5A3C">
    <!-- 头部轮廓 16x16像素 -->
    <rect x="28" y="8" width="24" height="4"/>
    <rect x="24" y="12" width="32" height="4"/>
    <rect x="24" y="16" width="32" height="4"/>
    <rect x="24" y="20" width="32" height="4"/>
    <rect x="24" y="24" width="32" height="4"/>
    <rect x="28" y="28" width="24" height="4"/>
    <rect x="32" y="32" width="16" height="4"/>
    <rect x="36" y="36" width="8" height="4"/>
  </g>
  
  <!-- 耳朵 -->
  <g fill="#8B5A3C">
    <rect x="20" y="20" width="4" height="8"/>
    <rect x="56" y="20" width="4" height="8"/>
  </g>
  
  <!-- 眉毛 -->
  <g fill="#1A1A1A">
    <rect x="32" y="20" width="8" height="2"/>
    <rect x="44" y="20" width="8" height="2"/>
  </g>
  
  <!-- 眼睛 - 深棕色 -->
  <g fill="#3D2914">
    <rect x="32" y="24" width="6" height="6"/>
    <rect x="46" y="24" width="6" height="6"/>
  </g>
  
  <!-- 眼睛高光 -->
  <g fill="#FFFFFF">
    <rect x="34" y="24" width="2" height="2"/>
    <rect x="48" y="24" width="2" height="2"/>
  </g>
  
  <!-- 腮红 -->
  <g fill="#A0522D" opacity="0.6">
    <rect x="28" y="32" width="4" height="2"/>
    <rect x="52" y="32" width="4" height="2"/>
  </g>
  
  <!-- 鼻子 -->
  <g fill="#6B4226">
    <rect x="38" y="32" width="4" height="2"/>
  </g>
  
  <!-- 嘴巴 - 微笑 -->
  <g fill="#8B3A3A">
    <rect x="34" y="40" width="4" height="2"/>
    <rect x="38" y="42" width="4" height="2"/>
    <rect x="42" y="40" width="4" height="2"/>
  </g>
</svg>
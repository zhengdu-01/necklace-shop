<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="300" fill="#f5f5f5"/>
  
  <!-- 脖子 -->
  <ellipse cx="100" cy="115" rx="12" ry="15" fill="#7A4E2A" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 脖子参考点（隐藏） -->
  <circle cx="100" cy="110" r="5" fill="none" id="neckPoint"/>
  
  <!-- 身体/衣服 - 紫色吊带裙 纤细版 -->
  <!-- 左肩带 -->
  <rect x="75" y="125" width="8" height="25" fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 右肩带 -->
  <rect x="117" y="125" width="8" height="25" fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 裙子主体 - 窄肩60px -->
  <path d="M 70 145 
           Q 65 160 60 180
           L 55 220
           Q 52 250 50 280
           L 150 280
           Q 148 250 145 220
           L 140 180
           Q 135 160 130 145
           Q 115 155 100 150
           Q 85 155 70 145 Z" 
        fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 衣服褶皱阴影 -->
  <path d="M 70 180 Q 80 200 75 220" fill="none" stroke="#663399" stroke-width="2" opacity="0.5"/>
  <path d="M 130 180 Q 120 200 125 220" fill="none" stroke="#663399" stroke-width="2" opacity="0.5"/>
  <path d="M 90 200 Q 100 220 110 200" fill="none" stroke="#663399" stroke-width="2" opacity="0.3"/>
  
  <!-- 头部 - 大头小身比例 -->
  <!-- 脸型 -->
  <ellipse cx="100" cy="70" rx="45" ry="50" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="55" cy="70" rx="8" ry="12" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  <ellipse cx="145" cy="70" rx="8" ry="12" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 头发 - 黑色卷发/爆炸头 -->
  <!-- 爆炸头主体 -->
  <ellipse cx="100" cy="55" rx="55" ry="45" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 卷发纹理 -->
  <circle cx="55" cy="35" r="12" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="75" cy="25" r="14" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="100" cy="20" r="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="125" cy="25" r="14" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="145" cy="35" r="12" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="155" cy="55" r="11" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="150" cy="80" r="10" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="50" cy="55" r="11" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="45" cy="80" r="10" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- 前额卷发 -->
  <circle cx="70" cy="45" r="8" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="85" cy="40" r="9" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="100" cy="38" r="9" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="115" cy="40" r="9" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="130" cy="45" r="8" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  
  <!-- 眉毛 -->
  <path d="M 75 62 Q 82 60 89 62" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 111 62 Q 118 60 125 62" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 - 深棕色圆点 -->
  <circle cx="82" cy="74" r="6" fill="#2F1B0C" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="118" cy="74" r="6" fill="#2F1B0C" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- 眼睛高光 -->
  <circle cx="84" cy="72" r="2" fill="white"/>
  <circle cx="120" cy="72" r="2" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="68" cy="88" rx="6" ry="4" fill="#A0522D" opacity="0.5"/>
  <ellipse cx="132" cy="88" rx="6" ry="4" fill="#A0522D" opacity="0.5"/>
  
  <!-- 鼻子 -->
  <path d="M 100 80 L 98 88 L 102 88" fill="none" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 嘴巴 - 可爱微笑 -->
  <path d="M 90 98 Q 100 105 110 98" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
</svg>
<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="300" fill="#f5f5f5"/>
  
  <!-- 脖子 -->
  <ellipse cx="100" cy="115" rx="14" ry="16" fill="#E8C4B8" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 脖子参考点（隐藏） -->
  <circle cx="100" cy="110" r="5" fill="none" id="neckPoint"/>
  
  <!-- 身体/衣服 - 蓝色吊带裙 丰满版 -->
  <!-- 左肩带 -->
  <rect x="68" y="128" width="8" height="25" fill="#87CEEB" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 右肩带 -->
  <rect x="124" y="128" width="8" height="25" fill="#87CEEB" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 裙子主体 - 宽肩80px，胸部隆起 -->
  <path d="M 60 148 
           Q 55 165 52 185
           Q 48 210 45 240
           L 42 280
           L 158 280
           L 155 240
           Q 152 210 148 185
           Q 145 165 140 148
           Q 120 165 100 155
           Q 80 165 60 148 Z" 
        fill="#87CEEB" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 胸部隆起 -->
  <ellipse cx="85" cy="165" rx="18" ry="15" fill="#5CADCD" opacity="0.3"/>
  <ellipse cx="115" cy="165" rx="18" ry="15" fill="#5CADCD" opacity="0.3"/>
  
  <!-- 衣服褶皱阴影 -->
  <path d="M 65 190 Q 75 215 70 240" fill="none" stroke="#4682B4" stroke-width="2" opacity="0.5"/>
  <path d="M 135 190 Q 125 215 130 240" fill="none" stroke="#4682B4" stroke-width="2" opacity="0.5"/>
  <path d="M 85 210 Q 100 235 115 210" fill="none" stroke="#4682B4" stroke-width="2" opacity="0.3"/>
  
  <!-- 头部 - 大头小身比例 -->
  <!-- 脸型 -->
  <ellipse cx="100" cy="70" rx="48" ry="52" fill="#FAD7D0" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="52" cy="70" rx="9" ry="13" fill="#FAD7D0" stroke="#2d2d2d" stroke-width="2"/>
  <ellipse cx="148" cy="70" rx="9" ry="13" fill="#FAD7D0" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 头发 - 金色波浪发 -->
  <!-- 后脑勺头发 -->
  <path d="M 52 70 Q 47 25 100 20 Q 153 25 148 70 L 151 105 Q 155 138 142 155 L 58 155 Q 45 138 49 105 Z" 
        fill="#DAA520" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 波浪纹理 -->
  <path d="M 56 45 Q 67 56 78 45 Q 89 56 100 45 Q 111 56 122 45 Q 133 56 144 45" 
        fill="none" stroke="#B8860B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 54 72 Q 65 83 76 72 Q 87 83 98 72" 
        fill="none" stroke="#B8860B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 102 72 Q 113 83 124 72 Q 135 83 146 72" 
        fill="none" stroke="#B8860B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 刘海 -->
  <path d="M 56 38 Q 67 50 78 38 Q 89 50 100 38 Q 111 50 122 38 Q 133 50 144 38" 
        fill="none" stroke="#DAA520" stroke-width="11" stroke-linecap="round"/>
  <!-- 两侧长发 -->
  <path d="M 52 70 Q 44 105 50 145" fill="none" stroke="#DAA520" stroke-width="14" stroke-linecap="round"/>
  <path d="M 148 70 Q 156 105 150 145" fill="none" stroke="#DAA520" stroke-width="14" stroke-linecap="round"/>
  
  <!-- 眉毛 -->
  <path d="M 72 58 Q 80 55 88 58" fill="none" stroke="#8B7355" stroke-width="2" stroke-linecap="round"/>
  <path d="M 112 58 Q 120 55 128 58" fill="none" stroke="#8B7355" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 - 蓝色 -->
  <circle cx="80" cy="72" r="7" fill="#4169E1" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="120" cy="72" r="7" fill="#4169E1" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- 眼睛高光 -->
  <circle cx="82" cy="70" r="2.5" fill="white"/>
  <circle cx="122" cy="70" r="2.5" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="64" cy="88" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="136" cy="88" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <path d="M 100 80 L 97 88 L 103 88" fill="none" stroke="#E6C2B8" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 嘴巴 - 可爱微笑 -->
  <path d="M 88 100 Q 100 108 112 100" fill="none" stroke="#C44569" stroke-width="2.5" stroke-linecap="round"/>
</svg>
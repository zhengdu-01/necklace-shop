<svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 像素大小：4x4 SVG单位 -->
  
  <!-- 头发后层 - 金色 -->
  <g fill="#D4A856">
    <!-- 后脑勺 -->
    <rect x="24" y="8" width="32" height="4"/>
    <rect x="20" y="12" width="40" height="4"/>
    <rect x="16" y="16" width="48" height="4"/>
    <rect x="16" y="20" width="48" height="4"/>
    <rect x="16" y="24" width="48" height="4"/>
    <!-- 长发 -->
    <rect x="12" y="28" width="8" height="4"/>
    <rect x="12" y="32" width="8" height="4"/>
    <rect x="12" y="36" width="8" height="4"/>
    <rect x="60" y="28" width="8" height="4"/>
    <rect x="60" y="32" width="8" height="4"/>
    <rect x="60" y="36" width="8" height="4"/>
    <!-- 金色高光 -->
    <rect x="24" y="12" width="4" height="4" fill="#F0D878"/>
    <rect x="52" y="12" width="4" height="4" fill="#F0D878"/>
  </g>
  
  <!-- 身体/衣服 - 蓝色吊带裙 丰满版 -->
  <g fill="#5DADE2">
    <!-- 左肩带 -->
    <rect x="28" y="64" width="4" height="8"/>
    <!-- 右肩带 -->
    <rect x="48" y="64" width="4" height="8"/>
    <!-- 裙子主体 - 宽版 -->
    <rect x="24" y="72" width="4" height="4"/>
    <rect x="52" y="72" width="4" height="4"/>
    <rect x="20" y="76" width="40" height="4"/>
    <rect x="20" y="80" width="40" height="4"/>
    <rect x="20" y="84" width="40" height="4"/>
    <rect x="20" y="88" width="40" height="4"/>
    <rect x="20" y="92" width="40" height="4"/>
    <rect x="20" y="96" width="40" height="4"/>
    <rect x="20" y="100" width="40" height="4"/>
    <rect x="20" y="104" width="40" height="4"/>
    <rect x="20" y="108" width="40" height="4"/>
    <rect x="20" y="112" width="40" height="4"/>
  </g>
  
  <!-- 脖子 -->
  <g fill="#F5D5C5">
    <rect x="36" y="56" width="4" height="4"/>
    <rect x="40" y="56" width="4" height="4"/>
  </g>
  
  <!-- 项链占位符 - 会被JS替换 -->
  <g id="necklace-group">
    <!-- 链子 - 丰满版更宽 -->
    <rect x="24" y="60" width="4" height="4" fill="#FFD700"/>
    <rect x="28" y="62" width="4" height="4" fill="#FFD700"/>
    <rect x="32" y="63" width="4" height="4" fill="#FFD700"/>
    <rect x="36" y="64" width="4" height="4" fill="#FFD700"/>
    <rect x="40" y="64" width="4" height="4" fill="#FFD700"/>
    <rect x="44" y="63" width="4" height="4" fill="#FFD700"/>
    <rect x="48" y="62" width="4" height="4" fill="#FFD700"/>
    <rect x="52" y="60" width="4" height="4" fill="#FFD700"/>
    <!-- 吊坠组 -->
    <g id="pendant-group" transform="translate(38, 67)">
      <rect x="0" y="0" width="8" height="8" fill="#FF69B4"/>
    </g>
  </g>
  
  <!-- 头部 - 4头身比例，头占1份 -->
  <!-- 脸型 - 白皙皮肤 -->
  <g fill="#F5D5C5">
    <!-- 头部轮廓 16x16像素 -->
    <rect x="28" y="8" width="24" height="4"/>
    <rect x="24" y="12" width="32" height="4"/>
    <rect x="24" y="16" width="32" height="4"/>
    <rect x="24" y="20" width="32" height="4"/>
    <rect x="24" y="24" width="32" height="4"/>
    <rect x="28" y="28" width="24" height="4"/>
    <rect x="32" y="32" width="16" height="4"/>
    <rect x="36" y="36" width="8" height="4"/>
  </g>
  
  <!-- 耳朵 -->
  <g fill="#F5D5C5">
    <rect x="20" y="20" width="4" height="8"/>
    <rect x="56" y="20" width="4" height="8"/>
  </g>
  
  <!-- 刘海 - 金色 -->
  <g fill="#D4A856">
    <rect x="28" y="12" width="4" height="4"/>
    <rect x="32" y="12" width="4" height="4"/>
    <rect x="36" y="12" width="4" height="4"/>
    <rect x="40" y="12" width="4" height="4"/>
    <rect x="44" y="12" width="4" height="4"/>
    <rect x="48" y="12" width="4" height="4"/>
    <rect x="32" y="16" width="4" height="4"/>
    <rect x="44" y="16" width="4" height="4"/>
  </g>
  
  <!-- 眉毛 - 浅棕色 -->
  <g fill="#B8956A">
    <rect x="32" y="20" width="8" height="2"/>
    <rect x="44" y="20" width="8" height="2"/>
  </g>
  
  <!-- 眼睛 - 蓝色 -->
  <g fill="#4A90A4">
    <rect x="32" y="24" width="6" height="6"/>
    <rect x="46" y="24" width="6" height="6"/>
  </g>
  
  <!-- 眼睛高光 -->
  <g fill="#FFFFFF">
    <rect x="34" y="24" width="2" height="2"/>
    <rect x="48" y="24" width="2" height="2"/>
  </g>
  
  <!-- 腮红 -->
  <g fill="#FFB6C1" opacity="0.7">
    <rect x="28" y="32" width="4" height="2"/>
    <rect x="52" y="32" width="4" height="2"/>
  </g>
  
  <!-- 鼻子 -->
  <g fill="#E8C4B8">
    <rect x="38" y="32" width="4" height="2"/>
  </g>
  
  <!-- 嘴巴 - 微笑 -->
  <g fill="#D47A7A">
    <rect x="34" y="40" width="4" height="2"/>
    <rect x="38" y="42" width="4" height="2"/>
    <rect x="42" y="40" width="4" height="2"/>
  </g>
</svg>
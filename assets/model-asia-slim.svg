<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#f5f5f5"/>
  
  <!-- 头发后层 -->
  <path d="M 55 70 Q 50 40 100 35 Q 150 40 145 70 L 145 85 Q 150 100 140 110 L 60 110 Q 50 100 55 85 Z" 
        fill="#1a1a1a" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 两侧长发后层 -->
  <path d="M 55 70 Q 45 100 50 130" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
  <path d="M 145 70 Q 155 100 150 130" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 身体/衣服 - 粉色吊带裙 纤细版 -->
  <!-- 左肩带 -->
  <rect x="75" y="125" width="8" height="25" fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 右肩带 -->
  <rect x="117" y="125" width="8" height="25" fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 裙子主体 - 窄肩60px -->
  <path d="M 70 145 
           Q 65 160 60 180
           L 55 220
           Q 52 250 50 280
           L 150 280
           Q 148 250 145 220
           L 140 180
           Q 135 160 130 145
           Q 115 155 100 150
           Q 85 155 70 145 Z" 
        fill="#FF69B4" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 衣服褶皱阴影 -->
  <path d="M 70 180 Q 80 200 75 220" fill="none" stroke="#C71585" stroke-width="2" opacity="0.5"/>
  <path d="M 130 180 Q 120 200 125 220" fill="none" stroke="#C71585" stroke-width="2" opacity="0.5"/>
  <path d="M 90 200 Q 100 220 110 200" fill="none" stroke="#C71585" stroke-width="2" opacity="0.3"/>
  
  <!-- 脖子 -->
  <ellipse cx="100" cy="115" rx="12" ry="15" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 项链 - 金色链子 + 爱心吊坠 -->
  <!-- 链子路径 -->
  <path id="chain-path" d="M70 110 Q100 135 130 110" fill="none" stroke="#FFD700" stroke-width="3"/>
  <!-- 吊坠组 -->
  <g id="pendant-group" transform="translate(100, 122)">
    <path d="M0 8 Q-8 0 -8 -5 Q-8 -10 0 -10 Q8 -10 8 -5 Q8 0 0 8" fill="#FF69B4" stroke="#C71585" stroke-width="1.5"/>
  </g>
  <!-- 脖子参考点 -->
  <circle id="neck-center" cx="100" cy="110" r="3" fill="none"/>
  
  <!-- 头部 - 大头小身比例 -->
  <!-- 脸型 -->
  <ellipse cx="100" cy="70" rx="45" ry="50" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="55" cy="70" rx="8" ry="12" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  <ellipse cx="145" cy="70" rx="8" ry="12" fill="#F5D0A9" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 头发前层 - 刘海 -->
  <path d="M 58 55 Q 70 65 80 55 Q 90 65 100 55 Q 110 65 120 55 Q 130 65 142 55" 
        fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 眉毛 -->
  <path d="M 75 60 Q 82 58 89 60" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 111 60 Q 118 58 125 60" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 - 深棕色圆点 -->
  <circle cx="82" cy="72" r="6" fill="#4A3728" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="118" cy="72" r="6" fill="#4A3728" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- 眼睛高光 -->
  <circle cx="84" cy="70" r="2" fill="white"/>
  <circle cx="120" cy="70" r="2" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="70" cy="85" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="130" cy="85" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <path d="M 100 78 L 98 85 L 102 85" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 嘴巴 - 可爱微笑 -->
  <path d="M 90 95 Q 100 102 110 95" fill="none" stroke="#C44569" stroke-width="2" stroke-linecap="round"/>
</svg>
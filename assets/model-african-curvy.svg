<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#f5f5f5"/>
  
  <!-- 头发后层 - 卷发/爆炸头 -->
  <ellipse cx="100" cy="52" rx="58" ry="48" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="2"/>
  <circle cx="52" cy="30" r="13" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="73" cy="18" r="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="100" cy="12" r="17" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="127" cy="18" r="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="148" cy="30" r="13" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="160" cy="55" r="12" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="155" cy="82" r="11" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="45" cy="55" r="12" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  <circle cx="40" cy="82" r="11" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.5"/>
  
  <!-- 身体/衣服 - 紫色吊带裙 丰满版 -->
  <!-- 左肩带 -->
  <rect x="68" y="128" width="8" height="25" fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 右肩带 -->
  <rect x="124" y="128" width="8" height="25" fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 裙子主体 - 宽肩80px，胸部隆起 -->
  <path d="M 60 148 
           Q 55 165 52 185
           Q 48 210 45 240
           L 42 280
           L 158 280
           L 155 240
           Q 152 210 148 185
           Q 145 165 140 148
           Q 120 165 100 155
           Q 80 165 60 148 Z" 
        fill="#9370DB" stroke="#2d2d2d" stroke-width="2"/>
  <!-- 胸部隆起 -->
  <ellipse cx="85" cy="165" rx="18" ry="15" fill="#7B68EE" opacity="0.3"/>
  <ellipse cx="115" cy="165" rx="18" ry="15" fill="#7B68EE" opacity="0.3"/>
  <!-- 衣服褶皱阴影 -->
  <path d="M 65 190 Q 75 215 70 240" fill="none" stroke="#663399" stroke-width="2" opacity="0.5"/>
  <path d="M 135 190 Q 125 215 130 240" fill="none" stroke="#663399" stroke-width="2" opacity="0.5"/>
  <path d="M 85 210 Q 100 235 115 210" fill="none" stroke="#663399" stroke-width="2" opacity="0.3"/>
  
  <!-- 脖子 -->
  <ellipse cx="100" cy="115" rx="14" ry="16" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 项链 - 金色链子 + 爱心吊坠 -->
  <!-- 链子路径 - 更宽以适应丰满身材 -->
  <path id="chain-path" d="M65 110 Q100 140 135 110" fill="none" stroke="#FFD700" stroke-width="3"/>
  <!-- 吊坠组 -->
  <g id="pendant-group" transform="translate(100, 125)">
    <path d="M0 10 Q-10 0 -10 -6 Q-10 -12 0 -12 Q10 -12 10 -6 Q10 0 0 10" fill="#FF69B4" stroke="#C71585" stroke-width="1.5"/>
  </g>
  <!-- 脖子参考点 -->
  <circle id="neck-center" cx="100" cy="110" r="3" fill="none"/>
  
  <!-- 头部 - 大头小身比例 -->
  <!-- 脸型 -->
  <ellipse cx="100" cy="70" rx="48" ry="52" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="52" cy="70" rx="9" ry="13" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  <ellipse cx="148" cy="70" rx="9" ry="13" fill="#8B5A2B" stroke="#2d2d2d" stroke-width="2"/>
  
  <!-- 头发前层 - 前额卷发 -->
  <circle cx="68" cy="42" r="9" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="84" cy="36" r="10" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="100" cy="34" r="10" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="116" cy="36" r="10" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="132" cy="42" r="9" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  
  <!-- 眉毛 -->
  <path d="M 72 60 Q 80 57 88 60" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 112 60 Q 120 57 128 60" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 - 深棕色圆点 -->
  <circle cx="80" cy="74" r="7" fill="#2F1B0C" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="120" cy="74" r="7" fill="#2F1B0C" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- 眼睛高光 -->
  <circle cx="82" cy="72" r="2.5" fill="white"/>
  <circle cx="122" cy="72" r="2.5" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="64" cy="90" rx="8" ry="5" fill="#A0522D" opacity="0.5"/>
  <ellipse cx="136" cy="90" rx="8" ry="5" fill="#A0522D" opacity="0.5"/>
  
  <!-- 鼻子 -->
  <path d="M 100 82 L 97 90 L 103 90" fill="none" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 嘴巴 - 可爱微笑 -->
  <path d="M 88 102 Q 100 110 112 102" fill="none" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
</svg>